image: node:latest

cache:
  paths:
    - node_modules/

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/  # Assuming your build output is in a 'dist' directory

pages:
  stage: deploy
  script:
    - mv dist public  # GitLab Pages requires the files to be in a 'public' directory
  artifacts:
    paths:
      - public
  only:
    - main  # This job will only run on the main branch
