image: node:latest

stages:
  - install
  - build
  - publish

variables:
  NPM_TOKEN: ${CI_JOB_TOKEN}

cache:
  paths:
    - '**/node_modules/'

install:
  stage: install
  script:
    - npm install

build:
  stage: build
  needs: [install]
  script:
    - npm run build
  artifacts:
    paths:
      - packages/*/dist

publish:
  stage: publish
  needs: [build]
  script:
    - echo "@pdfme:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
    - echo "${CI_API_V4_URL#https?}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - echo "//gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm config set @pdfme:registry ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/
    - npm publish -ws --registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/
  only:
    - main